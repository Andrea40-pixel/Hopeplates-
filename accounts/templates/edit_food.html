<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Food Donation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #ffffff);
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .card-header {
            background-color: #0d6efd;
            color: white;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn-blue {
            background-color: #0d6efd;
            color: white;
            border-radius: 8px;
        }

        .btn-blue:hover {
            background-color: #084298;
        }

        .back-link {
            color: #0d6efd;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-12">

            <div class="card shadow-lg">

                <div class="card-header text-center py-3">
                    <h4 class="mb-0">Add Food Donation</h4>
                </div>

                <div class="card-body p-4">

                    <form method="POST" action="{% url 'update_food' data.id %}" enctype="multipart/form-data">
    {% csrf_token %}
                         <div class="mb-3">
                            <label class="form-label">Donar</label>
                            <input type="text" class="form-control" placeholder="Enter Donar name" name="donar_name" value="{{ request.user.username }}">

                        </div>
                         <div class="mb-3">
                            <label class="form-label">Restaurant Name</label>
                            <input type="text" class="form-control" placeholder="Enter Restaurant name" name="shop_name" value="{{data.shop_name}}">
                        </div>

                        <!-- Food Name -->
                        <div class="mb-3">
                            <label class="form-label">Food Name</label>
                            <input type="text" class="form-control" placeholder="Enter food name" name="food_name" value="{{data.food_name}}">
                        </div>

                        <!-- Quantity -->
                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="text" class="form-control" placeholder="Enter quantity" name="quantity" value="{{data.quantity}}">
                        </div>

                         <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" class="form-control" placeholder="Enter Description" name="description" value="{{data.description}}">
                        </div>

                        <!-- Location -->
                        <div class="mb-3">
                            <label class="form-label">Pickup Location</label>
                            <input type="text" class="form-control" placeholder="Enter location" name="location" value="{{data.location}}">
                        </div>

                        <!-- Expiry Date -->
                        <div class="mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" class="form-control" name="expiry_date" value="{{data.expiry_date}}">
                        </div>

                        <!-- Image Upload -->
                        <div class="mb-4">
                            <label class="form-label">Upload Food Image</label>
                            <input type="file" class="form-control" name="image">
                        </div>

                         <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status">
                                <option selected disabled>Select Status</option>
                                <option value="Available">Available</option>
                                <option value="Accepted">Accepted</option>
                                <option value="Expired">Expired</option>
                            </select>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-blue">
                                Add Donation
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-3">
                        <a href="#" class="back-link">← Back to Dashboard</a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
