<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<body>
<h3 class="mb-4">Pickup Requests</h3>

<div class="table-responsive">
    <table class="table table-bordered table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>NGO Name</th>
                <th>Food Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.ngo.username }}</td>
                <td>{{ req.donation.food_name }}</td>
                <td>
                    <a href="{% url 'accept_request' req.id %}" class="btn btn-success btn-sm">
                        Accept
                    </a>

                    <a href="{% url 'reject_request' req.id %}" class="btn btn-danger btn-sm">
                        Reject
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center text-muted">
                    No pending requests
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>



</body>
</html>
